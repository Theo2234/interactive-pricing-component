<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Interactive pricing component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <!-- <img src="/images/bg-pattern.svg"> -->
   <main>
     <header>
  <h1>Simple, traffic-based pricing</h1>
  <p>Sign-up for our 30-day trial. No credit card required. </p>
   </header>

 <section class="pricing-card">
      <div class="pageviews" id="pageviews">100K PAGEVIEWS</div>
      <div class="price" id="price">$16.00 <span>/ month</span></div>

      <input type="range" min="1" max="5" value="3" class="slider" id="slider" />

      <div class="billing">
        <span>Monthly Billing</span>
        <div class="toggle" id="toggle"></div>
        <span>Yearly Billing</span>
        <span class="discount">25% discount</span>
      </div>

      <div class="bottom-div">
        
      <ul>
        
        <li> <img src="/images/icon-check.svg">  Unlimited websites</li>
        <li><img src="/images/icon-check.svg"> 100% data ownership</li>
        <li><img src="/images/icon-check.svg"> Email reports</li>
       
      </ul>
      

      <button class="btn">Start my trial</button>
      </div>
    </section>
</main>

    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
</body>
<script src="index.js"></script>
</html>
